server {
    listen 80;
    server_name 3-93-192-182.nip.io;
    return 301 https://3-93-192-182.nip.io$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 3-93-192-182.nip.io;
    
    ssl_certificate /etc/letsencrypt/live/3-93-192-182.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3-93-192-182.nip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    client_max_body_size 20M;
    
    location /assets/ {
        root /var/www/tpa-alpha/tpa-alpha-bot/frontend/dist;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        root /var/www/tpa-alpha/tpa-alpha-bot/frontend/dist;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location / {
        root /var/www/tpa-alpha/tpa-alpha-bot/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
    
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
